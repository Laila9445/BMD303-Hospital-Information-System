# Alembic Configuration File for Radiology Backend
# This file is read by Alembic to configure the migration environment

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# as a list separated by pathsep
# the format is similar to one used by the shell's PATH
# upstream user, required
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to datetime.datetime.now().astimezone()
timezone = 

# max length of characters to apply to the
# "slug" field of the migration name.
# set to -1 to disable, causing the latest revision number
# to be used instead
# revision character length is 4
# (one commonly sees either the character count pre-specified, or just
# an equal line of dashes instead)
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# this is useful for systems where you want to allow
# for incremental offline migrations
# the environment will be loaded with the context
# provided in the revision.update_ddl() call
# revision.update_ddl() call also provides a way to execute
# statements in the database before the migration file
# is generated.
# False will only run the environment if it's called with upgrade, downgrade, or the Python API.
always = False

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
